name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 1604 }}
          script: |
            set -e

            echo "▶ Pull du code"
            cd /srv/docker/todolist/source
            git pull origin main

            echo "▶ Migration Prisma (via conteneur temporaire)"
            DB_URL="$(grep ^DATABASE_URL /srv/docker/todolist/.env | cut -d= -f2-)"
            docker run --rm \
              --network host \
              -e DATABASE_URL="$DB_URL" \
              -v /srv/docker/todolist/source:/app \
              -w /app \
              node:22-bookworm-slim \
              sh -c "corepack enable && corepack prepare pnpm@11.4.0 --activate && pnpm --filter @repo/db db:push"

            echo "▶ Build Docker"
            cd /srv/docker/todolist
            docker compose build

            echo "▶ Redémarrage"
            docker compose up -d

            echo "▶ Sanity check"
            sleep 5
            curl -sf -o /dev/null http://127.0.0.1:3000 && echo "✅ App OK" || echo "⚠️ App non joignable"
