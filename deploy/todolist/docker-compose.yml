services:
  web:
    container_name: todolist-web
    build:
      context: ./source
      dockerfile: deploy/todolist/Dockerfile
      args:
        # NEXT_PUBLIC_* doit être présent au build Next.js (pas seulement au runtime)
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    env_file: .env
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
