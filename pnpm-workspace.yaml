packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  '@clerk/shared': true
  "@prisma/client": true
  "@prisma/engines": true
  browser-tabs-lock: true
  bufferutil: true
  core-js: true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
  utf-8-validate: true
overrides:
  "@prisma/client": "^7.8.0"
  expo-auth-session: "~55.0.16"
  expo-crypto: "~55.0.15"
  expo-web-browser: "~55.0.16"
  # Expo 55 utilise metro 0.83.x ; @react-native/metro-config tire 0.84.x et casse HMR.
  metro: 0.83.7
  metro-cache: 0.83.7
  metro-config: 0.83.7
  metro-core: 0.83.7
  metro-file-map: 0.83.7
  metro-resolver: 0.83.7
  metro-runtime: 0.83.7
  metro-source-map: 0.83.7
  metro-symbolicate: 0.83.7
  metro-transform-plugins: 0.83.7
  metro-transform-worker: 0.83.7
catalog:
  "@trpc/client": ^11.17.0
  "@trpc/react-query": ^11.17.0
  "@trpc/server": ^11.17.0
